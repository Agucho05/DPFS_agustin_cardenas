<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión - Hard&Custom</title>
    <link rel="stylesheet" href="../styles/styles.css" />
  </head>
  <body>
    <!-- Barra de Navegación -->
    <header class="navbar">
      <div class="logo">Hard&Custom</div>
      <input type="text" placeholder="Buscar productos..." class="search-bar" />
      <div class="cart-icon">🛒</div>
    </header>

    <main class="auth-wrapper">
      <section class="auth-card">
        <h2>Iniciar Sesión</h2>

        <form action="#" method="GET">
          <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-input"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Contraseña</label>
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              required
            />
          </div>

          <!-- Contenedor para "Recordarme" y "Olvidé mi contraseña" -->
          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" name="remember" /> Recordarme
            </label>
            <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
          </div>

          <button type="submit" class="btn-primary full-width">Ingresar</button>
        </form>

        <div class="auth-links">
          <p>¿No tienes cuenta? <a href="register.html">Crear una cuenta</a></p>
        </div>
      </section>
    </main>
  </body>
</html>
