<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear una cuenta - Hard&Custom</title>
    <link rel="stylesheet" href="../styles/styles.css" />
  </head>
  <body>
    <!-- Barra de Navegación -->
    <header class="navbar">
      <div class="logo">Hard&Custom</div>
      <input type="text" placeholder="Buscar productos..." class="search-bar" />
      <div class="cart-icon">🛒</div>
    </header>

    <main class="auth-wrapper">
      <section class="auth-card">
        <h2>Crear una cuenta</h2>

        <form action="#" method="GET">
          <div class="form-group">
            <label for="nombre">Nombre</label>
            <input
              type="text"
              id="nombre"
              name="nombre"
              class="form-input"
              placeholder="Ej: Agustín"
              required
            />
          </div>

          <div class="form-group">
            <label for="apellido">Apellido</label>
            <input
              type="text"
              id="apellido"
              name="apellido"
              class="form-input"
              required
            />
          </div>

          <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-input"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Contraseña</label>
            <!-- Agregamos la clase 'error' para cumplir con la muestra de validación visual del sprint -->
            <input
              type="password"
              id="password"
              name="password"
              class="form-input error"
              value="123"
              required
            />
            <span class="error-message"
              >La contraseña debe tener al menos 8 caracteres.</span
            >
          </div>

          <button type="submit" class="btn-primary full-width">
            Registrarme
          </button>
        </form>

        <div class="auth-links">
          <p>¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a></p>
        </div>
      </section>
    </main>
  </body>
</html>
