<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hard&Custom - Inicio</title>

    <link rel="stylesheet" href="../styles/styles.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="logo">Hard&Custom</div>
      <input type="text" placeholder="Buscar productos..." class="search-bar" />
      <div class="cart-icon">🛒</div>
    </header>

    <!-- Banner Principal -->
    <section class="hero-banner">
      <h1>Componentes de Alto Rendimiento</h1>
      <button class="btn-primary">Ver ofertas</button>
    </section>

    <!-- Grilla de Productos -->
    <main class="products-section">
      <h2>Productos Destacados</h2>
      <div class="product-grid">
        <!-- Producto 1 -->
        <article class="product-card">
          <div class="product-image-placeholder">Imagen</div>
          <h3>Monitor 240Hz</h3>
          <p class="price">$350.000</p>
          <button class="btn-secondary">Comprar</button>
        </article>

        <!-- Producto 2 -->
        <article class="product-card">
          <div class="product-image-placeholder">Imagen</div>
          <h3>Monitor 165Hz</h3>
          <p class="price">$280.000</p>
          <button class="btn-secondary">Comprar</button>
        </article>

        <!-- Producto 3 -->
        <article class="product-card">
          <div class="product-image-placeholder">Imagen</div>
          <h3>Teclado Mecánico 75%</h3>
          <p class="price">$95.000</p>
          <button class="btn-secondary">Comprar</button>
        </article>

        <!-- Producto 4 -->
        <article class="product-card">
          <div class="product-image-placeholder">Imagen</div>
          <h3>Teclado Mecánico RGB</h3>
          <p class="price">$110.000</p>
          <button class="btn-secondary">Comprar</button>
        </article>
      </div>
    </main>
  </body>
</html>
